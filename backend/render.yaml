services:
  - type: web
    name: cinefind-backend
    env: node
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_VERSION
        value: 20.0.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ML_SERVICE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PORT
        value: 3001
